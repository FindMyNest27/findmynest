name: PropertyMe FTP Poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll-ftp:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Poll FTP and send to FindMyNest
        run: |
          sudo apt-get install -y lftp 2>/dev/null
          mkdir -p /tmp/reaxml

          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" ftp.drivehq.com -e "set ftp:passive-mode true; set net:timeout 30; ls; bye"
