name: PropertyMe FTP Poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll-ftp:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Poll FTP and send to FindMyNest
        run: |
          sudo apt-get install -y lftp 2>/dev/null
          mkdir -p /tmp/reaxml
          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" -p 21 ftp.findmynest.co.nz -e "
            set ftp:passive-mode false;
            set net:timeout 20;
            set ftp:ssl-allow no;
            mget -E *.xml -O /tmp/reaxml/;
            mget -E *.XML -O /tmp/reaxml/;
            bye
          "
          shopt -s nullglob
          files=(/tmp/reaxml/*.xml /tmp/reaxml/*.XML)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No XML files found — nothing to process."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Sending: $f"
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/xml" \
              -H "x-api-key: ${{ secrets.FINDMYNEST_API_KEY }}" \
              --data-binary "@$f" \
              "https://vbkmfloxweczyvpfbsdh.supabase.co/functions/v1/reaxml-ingest")
            echo "Response $HTTP_CODE:"
            cat /tmp/response.json
          done
          echo "Done."
