name: PropertyMe FTP Poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll-ftp:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Poll FTP and send to FindMyNest
        run: |
          sudo apt-get install -y lftp 2>/dev/null
          mkdir -p /tmp/reaxml

          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" ftp.drivehq.com <<EOF
          set ftp:passive-mode true
          set net:timeout 30
          cd "${{ secrets.FTP_DIR }}"
          mget -E *.xml /tmp/reaxml/ 2>/dev/null || true
          mget -E *.XML /tmp/reaxml/ 2>/dev/null || true
          bye
          EOF

          for f in /tmp/reaxml/*.xml 2>/dev/null; do
            [ -f "$f" ] || continue
            curl -s -X POST \
              -H "Content-Type: application/xml" \
              -H "x-api-key: ${{ secrets.FINDMYNEST_API_KEY }}" \
              --data-binary "@$f" \
              "https://vbkmfloxweczyvpfbsdh.supabase.co/functions/v1/reaxml-ingest"
          done
